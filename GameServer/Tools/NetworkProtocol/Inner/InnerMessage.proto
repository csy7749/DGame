syntax = "proto3";
package Sining.Message;

message G2Game_CreateRoomRequest // IAddressRequest,G2Game_CreateRoomResponse
{
    long RoleId = 1;
    long AccountId = 2;
    int ServerId = 3;
    long SessionRuntimeId = 4;
    string RoleName = 5;
    int HeadId = 6;
    byte Sex = 7;
    uint Level = 8;
    uint FightValue = 9;
    int PlayerCount = 10;
}

message G2Game_CreateRoomResponse // IAddressResponse
{
    int RoomId = 1;
    int RoomSeq = 2;
    int PlayerCount = 3;
    repeated InnerRoomPlayerInfo PlayerInfos = 4;
    long CaptainRoleId = 5;
}

message G2Game_JoinRoomRequest // IAddressRequest,G2Game_JoinRoomResponse
{
    int RoomId = 1;
    long RoleId = 2;
    long AccountId = 3;
    int ServerId = 4;
    long SessionRuntimeId = 5;
    string RoleName = 6;
    int HeadId = 7;
    byte Sex = 8;
    uint Level = 9;
    uint FightValue = 10;
}

message G2Game_JoinRoomResponse // IAddressResponse
{
    int RoomId = 1;
    int RoomSeq = 2;
    int PlayerCount = 3;
    repeated InnerRoomPlayerInfo PlayerInfos = 4;
    long CaptainRoleId = 5;
}

message G2Game_LeaveRoomRequest // IAddressRequest,G2Game_LeaveRoomResponse
{
    int RoomId = 1;
    long RoleId = 2;
}

message G2Game_LeaveRoomResponse // IAddressResponse
{
}

message G2Game_StartBattleRequest // IAddressRequest,G2Game_StartBattleResponse
{
    int RoomId = 1;
    long RoleId = 2;
}

message G2Game_BattleLoadDoneRequest // IAddressRequest,G2Game_StartBattleResponse
{
    int RoomId = 1;
    long RoleId = 2;
}

message G2Game_StartBattleResponse // IAddressResponse
{
    repeated long SessionRuntimeIds = 1;
    int RoomId = 2;
    int RoomSeq = 3;
    int RandSeed = 4;
    int PlayerCount = 5;
    int BattleStatus = 6;
    byte IsGuide = 7;
    uint StartTime = 8;
    ulong BattleGID = 9;
    byte MultiPlayerBattle = 10;
    ulong CaptainPlayerId = 11;
    repeated CSLevelPlayerData PlayerDataList = 12;
    CSChapterInfo Chapter = 13;
    int Stage = 14;
    int MapID = 15;
}

message G2Gate_RoomPlayerInfoChangedMessage // IAddressMessage
{
    repeated long SessionRuntimeIds = 1;
    int RoomId = 2;
    int RoomSeq = 3;
    int PlayerCount = 4;
    repeated InnerRoomPlayerInfo PlayerInfos = 5;
    long CaptainRoleId = 6;
}

message InnerRoomPlayerInfo
{
    long RoleId = 1;
    string RoleName = 2;
    uint Level = 3;
    uint FightValue = 4;
}
