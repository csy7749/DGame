syntax = "proto3";
package Fantasy.Network.Message;

// 协议分为:
// ProtoBuf:可以在Outer和Inner文件里使用。
// MemoryPack:可以在Outer和Inner文件里使用。

// 目前工具支持以下几种特殊用法:
// 在message协议上方添加// Protocol+空格+协议名字
// 例如: // Protocol ProtoBuf 或 // Protocol MemoryPack

// 分别代表使用Protobuf序列化或使用MemoryPack序列化
// 通过添加 // using 导出时添加自定义命名空间
// 例如: // using System.Runtime // using System.Reflection

/// 玩家角色基础数据
message CSPlayerData
{
  ulong RoleID = 1; /// RoleID
  ulong RoleNo = 2; /// RoleNO
  string RoleName = 3; /// 角色名称
  int HeadID = 4; /// 头像ID
  byte Sex = 5; /// 性别
  uint Level = 6; /// 等级
  uint Exp = 7; /// 经验
  uint FightValue = 8; /// 战斗力
  uint Diamond = 9; /// 钻石
  uint Gold = 10; /// 金币
  uint Stam = 11; /// 体力
  long LastLoginTime = 12; /// 上次登录时间
  long CreateTime = 13; /// 创角时间
  byte IsFinGuide = 14; /// 是否完成新手引导
  string Sign = 15; /// 个性签名
  int WorldID = 16; /// 所在主服
  uint TotalRmb = 17; /// 累计充值金额
  long LastAddStamTime = 18; /// 上次增加体力时间
  int DailyBuyStamCount = 19; /// 每日购买体力次数
}