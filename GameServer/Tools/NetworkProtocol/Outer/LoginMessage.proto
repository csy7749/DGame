syntax = "proto3";
package Fantasy.Network.Message;

// 协议分为:
// ProtoBuf:可以在Outer和Inner文件里使用。
// MemoryPack:可以在Outer和Inner文件里使用。

// 目前工具支持以下几种特殊用法:
// 在message协议上方添加// Protocol+空格+协议名字
// 例如: // Protocol ProtoBuf 或 // Protocol MemoryPack

// 分别代表使用Protobuf序列化或使用MemoryPack序列化
// 通过添加 // using 导出时增加自定义命名空间
// 例如: // using System.Runtime // using System.Reflection

// 鉴权服务器

/// 注册账号协议
message C2A_RegisterRequest // IRequest,A2C_RegisterResponse
{
	string UserName = 1;
	string Password = 2;
}
/// 注册账号协议返回
message A2C_RegisterResponse // IResponse
{
}

/// 登录账号协议
message C2A_LoginRequest // IRequest,A2C_LoginResponse
{
	string UserName = 1;
	string Password = 2;
	uint32 LoginType = 3;
}
/// 登录账号协议返回
message A2C_LoginResponse // IResponse
{
  long RoleID = 1;
  string Token = 2;
  repeatedList CSServerInfo ServerInfoList = 3; // 服务器信息列表
  repeatedList int RecentServerList = 4; // 最近登录服务器列表ID
  repeatedList CSRecentServerRoleInfo RecentServerRoleInfoList = 5; // 最近登录服务器对应的角色摘要
}

/// 服务器信息
message CSServerInfo
{
  int ServerID = 1; /// 服务器ID
  string Name = 2; /// 服务器名字
  int Group = 3; /// 服务器分组
  string Address = 4; /// 服务器地址
  string Port = 5; /// 服务器端口号
  bool Recommend = 6; /// 是否是推荐服务器
  byte State = 7; /// 服务器状态
}

/// 最近登录服务器的角色摘要
message CSRecentServerRoleInfo
{
  int ServerID = 1; /// 服务器ID
  uint Level = 2; /// 角色等级
}

/// 同步当前选择的服务器
message C2A_RecordRecentServer // IMessage
{
  long RoleID = 1;
  int ServerID = 2; /// 服务器ID
}

// Gate服务器

/// 客户端登录到Gate服务器
message C2G_LoginRequest // IRequest,G2C_LoginResponse
{
	string Token = 1;
	int ServerID = 2;
}
/// 登录协议返回
message G2C_LoginResponse // IResponse
{
  CSPlayerData PlayerData = 1;
}
/// 通知客户端重复登录
message G2C_RepeatLogin // IMessage
{
}
