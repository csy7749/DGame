syntax = "proto3";
package Fantasy.Network.Message;

// 协议分为:
// ProtoBuf:可以在Outer和Inner文件里使用。
// MemoryPack:可以在Outer和Inner文件里使用。

// 目前工具支持以下几种特殊用法:
// 在message协议上方添加// Protocol+空格+协议名字
// 例如: // Protocol ProtoBuf 或 // Protocol MemoryPack

// 分别代表使用Protobuf序列化或使用MemoryPack序列化
// 通过添加 // using 导出时添加自定义命名空间
// 例如: // using System.Runtime // using System.Reflection

/// 活动类型的枚举
enum ActivityType
{
  ACTIVITY_TYPE_NONE, /// 无
}

/// 活动开启配置
message CSActivityOpenEntry
{
  int ActivityId = 1; /// 活动ID
  int ActivityType = 2; /// 活动类型
  uint OpenTime = 3; /// 开始时间
  uint EndTime = 4; /// 结束时间
  uint DelayTime = 5; /// 延迟消失时间
}