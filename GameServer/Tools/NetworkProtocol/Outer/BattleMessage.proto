syntax = "proto3";
package Fantasy.Network.Message;

enum FrameCmdType
{
    FRAME_CMD_GM,
    FRAME_CMD_PLAYER_MOVE,
}

message C2G_CreateRoomRequest // IRequest,G2C_CreateRoomResponse
{
    int PlayerCount = 1;
}

message G2C_CreateRoomResponse // IResponse
{
    CSRoomInfo RoomInfo = 1;
    int PlayerCount = 2;
    repeated CSRoomPlayerInfo PlayerInfos = 3;
}

message C2G_JoinRoomRequest // IRequest,G2C_JoinRoomResponse
{
    int RoomId = 1;
}

message G2C_JoinRoomResponse // IResponse
{
    CSRoomInfo RoomInfo = 1;
    int PlayerCount = 2;
    repeated CSRoomPlayerInfo PlayerInfos = 3;
}

message C2G_LeaveRoomRequest // IRequest,G2C_LeaveRoomResponse
{
}

message G2C_LeaveRoomResponse // IResponse
{
}

message G2C_RoomPlayerInfoChangedNotify // IMessage
{
    CSRoomInfo RoomInfo = 1;
    int PlayerCount = 2;
    repeated CSRoomPlayerInfo PlayerInfos = 3;
}

message C2S_SyncFrameDataReq // IMessage
{
    int ForecastFrameId = 1;
    int RevClientFrameId = 2;
    CSRoomInfo RoomInfo = 3;
    int RoomPlayerId = 4;
    CSOnePlayerFrameCmd FrameData = 5;
}

message S2C_BattleFinClientDataReq // IMessage
{
    CSBattleStartParam StartParam = 1;
    uint DurationTime = 2;
}

message CSBattleStartParam
{
    int RandSeed = 1;
    int Fps = 2;
    int PlayerCount = 3;
    int BattleStatus = 4;
    byte IsGuide = 5;
    uint StartTime = 6;
    ulong BattleGID = 7;
    byte MultiPlayerBattle = 8;
    ulong CaptainPlayerId = 9;
    uint LastOnlyBattleTime = 10;
}

message C2S_StartBattleRequest // IRequest,S2C_StartBattleResponse
{
}

message S2C_StartBattleResponse // IResponse
{
}

message S2C_NotifyBattleLoading // IMessage
{
}

message C2S_BattleLoadDoneRequest // IRequest,S2C_BattleLoadDoneResponse
{
}

message S2C_BattleLoadDoneResponse // IResponse
{
}

message S2C_NotifyEnterBattle // IMessage
{
    int RandSeed = 1;
    int PlayerCount = 2;
    byte IsHaveRoomInfo = 3;
    CSRoomInfo RoomInfoList = 4;
    int BattleStatus = 5;
    byte IsGuide = 6;
    uint StartTime = 7;
    ulong BattleGID = 8;
    byte MultiPlayerBattle = 9;
    ulong CaptainPlayerId = 10;
    repeated CSLevelPlayerData PlayerDataList = 11;
    CSChapterInfo Chapter = 12;
    int Stage = 13;
    int MapID = 14;
}

message CSChapterInfo // IMessage
{
    int ChapterID = 1;
    int Difficult = 2;
}

message S2C_BroadcastFrameData // IMessage
{
    CSRoomInfo RoomInfo = 1;
    int SveFrameId = 2;
    int FrameCount = 3;
    repeated CSSyncOneFrameData FrameDataList = 4;
}

message CSLevelPlayerData
{
    CSMiniRoleBaseShowData PlayerShowData = 1;
    CSBattlePlayerData PlayerBattleData = 2;
}

message CSMiniRoleBaseShowData
{
    uint Uin = 1;
    ulong RoleID = 2;
    uint WorldID = 3;
    byte Online = 4;
    ulong FightVal = 5;
    uint VIPLevel = 6;
    string RoleName = 7;
    byte Sex = 8;
    uint Head = 9;
    byte HeadSex = 10;
    string HeadURL = 11;
    uint HeadFrame = 12;
}

message CSBattlePlayerData
{
    ulong RoleID = 1;
    CSBattlePlayerBaseData PlayerBaseData = 2;
    CSLevelUnitRunData PlayerRunData = 3;
}

message CSLevelUnitRunData
{
    int Hp = 1;
    int Level = 2;
    int Exp = 3;
    int Gold = 4;
}

message CSBattlePlayerBaseData
{
    int PlayerLevel = 1;
    byte BodyType = 2;
    uint FashionID = 3;
    uint WeaponFashionID = 4;
    int CreateRoleDays = 5;
    int FailureCount = 6;
    CSUnitBattleAttrData AttrData = 7;
}

message CSUnitBattleAttrData
{
    int Atk = 1;
    int Hp = 2;
    int MaxHp = 3;
    int MoveSpeed = 4;
}

message CSRoomInfo
{
    int RoomId = 1;
    int RoomSeq = 2;
    ulong CaptainRoleId = 3;
}

message CSRoomPlayerInfo
{
    ulong RoleId = 1;
    string RoleName = 2;
    uint Level = 3;
    uint FightValue = 4;
}

message CSSyncOneFrameData
{
    int FrameId = 1;
    int SpeedUp = 2;
    int PlayerCount = 3;
    repeated CSOnePlayerFrameCmd PlayerFrameData = 4;
}

message CSOnePlayerFrameCmd
{
    int PlayerId = 1;
    int FrameCmdCount = 2;
    repeated CSFrameCmd FrameDataList = 4;
}

message CSFrameCmd
{
    byte Type = 1;
    CSFrameData Data = 2;
}

message CSFrameData
{
    CSFrameCmdGmInfo Gm = 1;
}

message CSFrameCmdGmInfo
{
    string GmString = 1;
}
