syntax = "proto3";
package Fantasy.Network.Message;

// 协议分为:
// ProtoBuf:可以在Outer和Inner文件里使用。
// MemoryPack:可以在Outer和Inner文件里使用。

// 目前工具支持以下几种特殊用法:
// 在message协议上方添加// Protocol+空格+协议名字
// 例如: // Protocol ProtoBuf 或 // Protocol MemoryPack

// 分别代表使用Protobuf序列化或使用MemoryPack序列化
// 通过添加 // using 导出时增加自定义命名空间
// 例如: // using System.Runtime // using System.Reflection

// Gate服务器

/// 查询功能开放列表
message C2G_QueryFuncOpenListRequest // IRequest,G2C_QueryFuncOpenListResponse
{
}

/// 功能开放列表返回
message G2C_QueryFuncOpenListResponse // IResponse
{
  repeatedList int OpenFuncList = 1; /// 已开放功能ID列表
}

/// 新增功能开放通知
message G2C_FuncOpenNotify // IMessage
{
  repeatedList int NewOpenFuncList = 1; /// 新增开放的功能ID列表
}
